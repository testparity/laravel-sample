settings:
  namespace_roots:
    app: App
    tests: Tests
  source_extension: ".php"
  test_suffix: "Test"
  test_extension: ".php"
  namespace_separator: "\\"

coverage_xml: parity-coverage.json
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "Laravel Services"
    paths:
      source: "app/Services"
      test: "tests/Unit/Services"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
